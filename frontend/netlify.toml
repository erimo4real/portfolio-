[build]
  command = "npm run build"
  publish = "dist"

# Proxy API requests to backend
[[redirects]]
  from = "/api/*"
  to = "https://portfolio-backend-0g6g.onrender.com/api/:splat"
  status = 200
  force = true

# Proxy uploads to backend
[[redirects]]
  from = "/uploads/*"
  to = "https://portfolio-backend-0g6g.onrender.com/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200